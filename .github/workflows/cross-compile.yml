name: cross-compile-compatibility

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./...

  cross-build:
    runs-on: ubuntu-latest
    needs: unit-test
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux/amd64
          - linux/arm64
          - linux/arm/7
          - windows/amd64
          - windows/arm64
          - windows/386
          - darwin/amd64
          - darwin/arm64
          - freebsd/amd64
          - freebsd/arm64
          - netbsd/amd64
          - openbsd/amd64
          - dragonfly/amd64
          - solaris/amd64
          - aix/ppc64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-build ${{ matrix.target }}
        env:
          CROSS_BUILD_TARGETS: ${{ matrix.target }}
        run: bash ./scripts/check-cross-builds.sh
